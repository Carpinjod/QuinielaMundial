name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - run: mvn test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase repository name
        id: vars
        run: echo "REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ steps.vars.outputs.REPO_LOWER }}:latest

      - name: Deploy to Hetzner VPS
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass
          sshpass -p "${{ secrets.SSH_PASSWORD }}" ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "set -e
             echo '→ Ensuring Docker is installed'
             command -v docker >/dev/null 2>&1 || (apt-get update -qq && apt-get install -y -qq docker.io)
             echo '→ Stopping systemd service if running'
             systemctl stop quiniela 2>/dev/null || true
             systemctl disable quiniela 2>/dev/null || true
             echo '→ Pulling latest image'
             docker pull ghcr.io/${{ steps.vars.outputs.REPO_LOWER }}:latest
             echo '→ Removing old container'
             docker stop quiniela-mundial 2>/dev/null || true
             docker rm quiniela-mundial 2>/dev/null || true
             echo '→ Starting new container'
             docker run -d --name quiniela-mundial \
               -p 8080:8080 \
               -v /opt/quiniela/data:/app/data \
               -e DATA_DIR=/app/data \
               -e PORT=8080 \
               --restart unless-stopped \
               ghcr.io/${{ steps.vars.outputs.REPO_LOWER }}:latest
             echo '→ Cleaning up old images'
             docker image prune -f"
